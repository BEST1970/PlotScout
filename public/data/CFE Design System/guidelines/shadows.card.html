<!-- @dsCard group="Spacing" viewport="700x180" name="Shadows" subtitle="Soft, cool-tinted elevation on the grey canvas" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;background:var(--color-bg);font-family:var(--font-sans);color:var(--cfe-navy)}
 .wrap{padding:28px 24px;display:flex;gap:22px}
 .cell{flex:1;display:flex;flex-direction:column;align-items:center;gap:12px}
 .box{width:100%;height:72px;background:#fff;border-radius:var(--radius-md)}
 .lab{font-size:11px;color:var(--text-secondary)}
</style></head>
<body><div class="wrap">
 <div class="cell"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="lab">xs</div></div>
 <div class="cell"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="lab">sm</div></div>
 <div class="cell"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="lab">md</div></div>
 <div class="cell"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="lab">lg</div></div>
</div></body></html>
