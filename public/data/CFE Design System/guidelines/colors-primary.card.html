<!-- @dsCard group="Colors" viewport="700x150" name="Primary" subtitle="Navy #00173A + white — the two primary colours" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;background:#fff;font-family:var(--font-sans)}
 .wrap{padding:20px;display:flex;gap:16px}
 .sw{flex:1;border-radius:var(--radius-md);height:104px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;box-sizing:border-box}
 .meta{font-size:11px;line-height:1.5}
 .name{font-size:13px;font-weight:700;margin-bottom:2px}
</style></head>
<body><div class="wrap">
 <div class="sw" style="background:var(--cfe-navy);color:#fff">
   <div class="name">Navy / Primary</div><div class="meta">#00173A · RGB 0 23 58 · Pantone 282C</div>
 </div>
 <div class="sw" style="background:#fff;border:1px solid var(--border);color:var(--cfe-navy)">
   <div class="name">White / Primary</div><div class="meta">#FFFFFF · RGB 255 255 255 · RAL 9016</div>
 </div>
 <div class="sw" style="background:var(--cfe-navy-deep);color:#fff">
   <div class="name">Navy Deep</div><div class="meta">#001129 · MOM-preferred header/footer</div>
 </div>
</div></body></html>
