<!-- @dsCard group="Colors" viewport="700x150" name="Status & semantic" subtitle="Success, warning, danger + surfaces" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;background:#fff;font-family:var(--font-sans)}
 .wrap{padding:20px;display:flex;gap:12px}
 .sw{flex:1;border-radius:var(--radius-sm);height:104px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;box-sizing:border-box}
 .name{font-size:12px;font-weight:700}
 .hex{font-size:10px;opacity:.9}
</style></head>
<body><div class="wrap">
 <div class="sw" style="background:var(--cfe-success);color:#fff"><div class="name">Success</div><div class="hex">#18A781</div></div>
 <div class="sw" style="background:var(--cfe-warning);color:#fff"><div class="name">Warning</div><div class="hex">#E97132</div></div>
 <div class="sw" style="background:var(--cfe-danger);color:#fff"><div class="name">Danger</div><div class="hex">#E5202B</div></div>
 <div class="sw" style="background:var(--color-bg);color:var(--cfe-navy);border:1px solid var(--border)"><div class="name">App canvas</div><div class="hex">#E3E6EE</div></div>
 <div class="sw" style="background:var(--color-surface-sunken);color:var(--cfe-navy);border:1px solid var(--border)"><div class="name">Sunken</div><div class="hex">#F4F6FA</div></div>
</div></body></html>
