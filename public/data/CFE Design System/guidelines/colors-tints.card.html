<!-- @dsCard group="Colors" viewport="700x150" name="Navy tints" subtitle="Derived tints for depth — never used as main colours" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;background:#fff;font-family:var(--font-sans)}
 .wrap{padding:20px;display:flex;gap:12px}
 .sw{flex:1;border-radius:var(--radius-sm);height:104px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;box-sizing:border-box}
 .name{font-size:12px;font-weight:700}
 .hex{font-size:10px;opacity:.85}
</style></head>
<body><div class="wrap">
 <div class="sw" style="background:var(--cfe-navy-05);color:var(--cfe-navy)"><div class="name">5%</div><div class="hex">#D2D8E3</div></div>
 <div class="sw" style="background:var(--cfe-navy-20);color:var(--cfe-navy)"><div class="name">20%</div><div class="hex">#ADB6CA</div></div>
 <div class="sw" style="background:var(--cfe-navy-60);color:#fff"><div class="name">60%</div><div class="hex">#43587B</div></div>
 <div class="sw" style="background:var(--cfe-navy-80);color:#fff"><div class="name">80%</div><div class="hex">#16365B</div></div>
 <div class="sw" style="background:var(--cfe-navy);color:#fff"><div class="name">100%</div><div class="hex">#00173A</div></div>
</div></body></html>
