<!-- @dsCard group="Colors" viewport="700x150" name="Application accents" subtitle="Chart & KPI accents used across the OEE dashboard" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;background:#fff;font-family:var(--font-sans)}
 .wrap{padding:20px;display:flex;gap:12px}
 .sw{flex:1;border-radius:var(--radius-sm);height:104px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;box-sizing:border-box;color:#fff}
 .name{font-size:12px;font-weight:700}
 .hex{font-size:10px;opacity:.9}
</style></head>
<body><div class="wrap">
 <div class="sw" style="background:var(--cfe-cyan)"><div class="name">Cyan</div><div class="hex">#00ADE5</div></div>
 <div class="sw" style="background:var(--cfe-blue)"><div class="name">Blue</div><div class="hex">#0080C8</div></div>
 <div class="sw" style="background:var(--cfe-teal)"><div class="name">Teal</div><div class="hex">#00A781</div></div>
 <div class="sw" style="background:var(--cfe-teal-deep)"><div class="name">Teal deep</div><div class="hex">#008779</div></div>
 <div class="sw" style="background:var(--cfe-sky);color:var(--cfe-navy)"><div class="name">Sky</div><div class="hex">#91D4F5</div></div>
</div></body></html>
