<!-- @dsCard group="Spacing" viewport="700x170" name="Radii" subtitle="4 / 6 / 10 / 16 / pill" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;background:#fff;font-family:var(--font-sans);color:var(--cfe-navy)}
 .wrap{padding:22px 24px;display:flex;gap:16px}
 .cell{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px}
 .box{width:100%;height:70px;background:var(--cfe-navy-05);border:1px solid var(--border-strong)}
 .lab{font-size:11px;color:var(--text-secondary);text-align:center}
 b{display:block;color:var(--cfe-navy)}
</style></head>
<body><div class="wrap">
 <div class="cell"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="lab"><b>xs</b>4px</div></div>
 <div class="cell"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="lab"><b>sm · controls</b>6px</div></div>
 <div class="cell"><div class="box" style="border-radius:var(--radius-md)"></div><div class="lab"><b>md · panels</b>10px</div></div>
 <div class="cell"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="lab"><b>lg · content cards</b>16px</div></div>
 <div class="cell"><div class="box" style="border-radius:var(--radius-pill)"></div><div class="lab"><b>pill</b>999px</div></div>
</div></body></html>
