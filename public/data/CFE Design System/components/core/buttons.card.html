<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--color-bg); font-family: var(--font-sans); }
  .wrap { padding: 24px; display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .lbl { width: 88px; font-size: 11px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--text-secondary); }
</style>
</head>
<body>
<div class="wrap" id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Button, IconButton } = window.CFEDesignSystem_1ee1e2;
  function Demo() {
    const Row = ({ label, children }) => (
      <div className="row"><span className="lbl">{label}</span>{children}</div>
    );
    return (
      <>
        <Row label="Variants">
          <Button variant="primary">Primary</Button>
          <Button variant="secondary">Secondary</Button>
          <Button variant="outline">Outline</Button>
          <Button variant="ghost">Ghost</Button>
          <Button variant="danger">Danger</Button>
          <Button variant="gradient">Gradient</Button>
        </Row>
        <Row label="With icon">
          <Button variant="primary" chevron>Submit and continue</Button>
          <Button variant="secondary" iconLeft="chevron-left">Return</Button>
          <Button variant="primary" iconLeft="plus">Add template</Button>
        </Row>
        <Row label="Sizes">
          <Button size="sm">Small</Button>
          <Button size="md">Medium</Button>
          <Button size="lg">Large</Button>
          <Button disabled>Disabled</Button>
        </Row>
        <Row label="Icon btns">
          <IconButton icon="chevron-left" variant="primary" label="prev" />
          <IconButton icon="chevron-right" variant="primary" label="next" />
          <IconButton icon="plus" variant="secondary" label="add" />
          <IconButton icon="filter" variant="outline" label="filter" />
          <IconButton icon="settings" variant="ghost" label="settings" />
          <IconButton icon="chevron-right" shape="round" variant="primary" label="open" />
        </Row>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
