<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--color-bg); font-family: var(--font-sans); }
  .wrap { padding: 28px 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 22px 20px; align-items: start; }
  .span2 { grid-column: 1 / -1; display: flex; gap: 28px; align-items: center; }
</style>
</head>
<body>
<div class="wrap" id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Input, Select, Checkbox, Switch } = window.CFEDesignSystem_1ee1e2;
  function Demo() {
    const [status, setStatus] = React.useState("Executed");
    return (
      <>
        <Input label="Customer" required defaultValue="VMA" />
        <Input label="Job" required defaultValue="SC" />
        <Select label="Activity status" required clearable value={status}
          onChange={(e) => setStatus(e.target.value)}
          options={["Executed", "Planned", "Cancelled"]} />
        <Input label="Duration" error="Exceeds 8h for this day" defaultValue="9" />
        <div className="span2">
          <Checkbox label="Billable" defaultChecked />
          <Checkbox label="Locked" />
          <Switch label="Always in viewport" defaultChecked />
          <Switch label="Hide app name" />
        </div>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
