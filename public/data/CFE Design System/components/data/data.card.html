<!-- @dsCard group="Components" viewport="700x360" name="KPI tiles, metric bars & data grid" subtitle="OEE dashboard data-viz primitives" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--color-bg); font-family: var(--font-sans); }
  .wrap { padding: 24px; display: flex; flex-direction: column; gap: 20px; }
  .kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .bars { display: flex; flex-direction: column; gap: 14px; }
</style>
</head>
<body>
<div class="wrap" id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { KpiStat, MetricBar, DataTable } = window.CFEDesignSystem_1ee1e2;
  function Demo() {
    return (
      <>
        <div className="kpis">
          <KpiStat label="Availability %" value="38,1" percent={38} />
          <KpiStat label="Performance %" value="109,4" delta="+2%" percent={100} barColor="var(--cfe-teal)" />
          <KpiStat label="Quality %" value="100,0" percent={100} barColor="var(--cfe-teal-deep)" />
        </div>
        <div className="bars">
          <MetricBar leftLabel="Running time" leftValue="282h 50m 48s" rightLabel="Downtime" rightValue="461h 9m 11s" percent={38} fill="var(--cfe-teal)" />
          <MetricBar leftLabel="Total output" leftValue="1.86M" rightLabel="Planned output" rightValue="4.46M" percent={41.6} fill="var(--cfe-cyan)" />
        </div>
        <DataTable
          columns={[
            { key: "customer", header: "Customer", link: true },
            { key: "project", header: "Project", link: true },
            { key: "resource", header: "Resource" },
          ]}
          rows={[
            { customer: "Fromunion", project: "Upgrade Momentum 18.0", resource: "Simon Reynaert" },
            { customer: "Fromunion", project: "Upgrade Momentum 18.0", resource: "Andrei Pashkov" },
            { customer: "Fromunion", project: "Upgrade Momentum 18.0", resource: "Jeroen De Cuyper" },
          ]}
          minRows={5}
        />
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
